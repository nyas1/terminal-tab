<head>

    <meta name="description" content="Terminal Tab — terminal-style new tab with widgets, themes, and animations.">
    <meta name="theme-color" content="#0d0d0d">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' data: https://cdnjs.cloudflare.com; connect-src 'self' https: ws://localhost:* ws://127.0.0.1:*; img-src 'self' data: https:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';">
    <title>~</title>
    <script>
        (function () {
            try {
                var t = JSON.parse(localStorage.getItem('tui-tab-title') || '"~"');
                if (typeof t === 'string') document.title = t.trim() || '~';
            } catch (e) { document.title = '~'; }
            try {
                var href = JSON.parse(localStorage.getItem('tui-tab-favicon') || '""');
                if (typeof href === 'string' && href.trim()) {
                    var link = document.createElement('link');
                    link.rel = 'icon';
                    link.href = href.trim();
                    link.setAttribute('data-tui-favicon', '1');
                    document.head.appendChild(link);
                }
            } catch (e) { }
        })();
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.10/css/weather-icons.min.css" integrity="sha384-z7urxOoxW8XTxSu9GHfjF2IMOLNAJ5YBGVEiX0qaKfOzOhfH/HceecZevk7aFifJ" crossorigin="anonymous">
    <!-- apply saved theme before first paint -->

            var BUILTIN_THEMES = {

                cyberpunk: { bg: '#000b1e', fg: '#00f3ff', muted: '#054863', border: '#003a5c', accent: '#ff003c', hover: '#001a3d' },
                toxic: { bg: '#121212', fg: '#e0e0e0', muted: '#333333', border: '#1f1f1f', accent: '#00ff41', hover: '#1a1a1a' },
                synthwave: { bg: '#2b213a', fg: '#fff', muted: '#534b62', border: '#463c57', accent: '#ff71ce', hover: '#382e4a' },
                nightowl: { bg: '#011627', fg: '#d6deeb', muted: '#637777', border: '#5f7e97', accent: '#82aaff', hover: '#0b2942' },
                coffee: { bg: '#201a1a', fg: '#d0c0c0', muted: '#5c4b4b', border: '#3c3030', accent: '#c0a080', hover: '#2d2424' },
                oceanic: { bg: '#1b2b34', fg: '#d8dee9', muted: '#4f5b66', border: '#343d46', accent: '#6699cc', hover: '#23343f' }
            };
            try {
                var themeName = JSON.parse(localStorage.getItem('tui-theme') || '"greyish"');
                // try custom themes first, then built-in
                var customThemes = JSON.parse(localStorage.getItem('tui-custom-themes') || '{}');
                var theme = (customThemes[themeName] && customThemes[themeName].colors) || BUILTIN_THEMES[themeName] || BUILTIN_THEMES.greyish;
                var r = document.documentElement.style;
                r.setProperty('--color-bg', theme.bg);
                r.setProperty('--color-fg', theme.fg);
                r.setProperty('--color-muted', theme.muted);
                r.setProperty('--color-border', theme.border);
                r.setProperty('--color-accent', theme.accent);
                r.setProperty('--color-hover', theme.hover);
                document.body && (document.body.style.backgroundColor = theme.bg);
            } catch (e) { }
        })();
    </script>
    <style>
        /* prevent FOUC */
        html {
            background-color: var(--color-bg, #222222);
            color: var(--color-fg, #aaaaaa);
        }

        body {
            background-color: var(--color-bg, #222222);
            color: var(--color-fg, #aaaaaa);
